name: Deploy Admin to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the OIDC role assumption (AWS_ROLE_TO_ASSUME).
permissions:
  contents: read
  id-token: write

concurrency:
  group: s3-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      # CRITICAL: output:'export' bakes NEXT_PUBLIC_* at BUILD time. These must be
      # passed in here from the repository variables, or api.js falls back to
      # http://localhost:* and the deployed site hits the wrong host.
      - name: Build static export
        env:
          NEXT_PUBLIC_API_BASE: ${{ vars.NEXT_PUBLIC_API_BASE }}
          NEXT_PUBLIC_AUTH_BASE: ${{ vars.NEXT_PUBLIC_AUTH_BASE }}
          NEXT_PUBLIC_TICKET_BASE: ${{ vars.NEXT_PUBLIC_TICKET_BASE }}
          NEXT_PUBLIC_USER_BASE: ${{ vars.NEXT_PUBLIC_USER_BASE }}
          NEXT_PUBLIC_SHOP_BASE: ${{ vars.NEXT_PUBLIC_SHOP_BASE }}
          NEXT_PUBLIC_TECHNICIAN_BASE: ${{ vars.NEXT_PUBLIC_TECHNICIAN_BASE }}
          NEXT_PUBLIC_INVENTORY_BASE: ${{ vars.NEXT_PUBLIC_INVENTORY_BASE }}
          NEXT_PUBLIC_MARKETPLACE_BASE: ${{ vars.NEXT_PUBLIC_MARKETPLACE_BASE }}
          NEXT_PUBLIC_PICKUP_BASE: ${{ vars.NEXT_PUBLIC_PICKUP_BASE }}
          NEXT_PUBLIC_NOTIFICATION_BASE: ${{ vars.NEXT_PUBLIC_NOTIFICATION_BASE }}
          NEXT_PUBLIC_SUBSCRIPTION_BASE: ${{ vars.NEXT_PUBLIC_SUBSCRIPTION_BASE }}
          NEXT_PUBLIC_ORDER_BASE: ${{ vars.NEXT_PUBLIC_ORDER_BASE }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync out/ "s3://${{ vars.S3_BUCKET_NAME }}" --delete
